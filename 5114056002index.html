<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Grid World - Value Iteration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1,
        h2,
        h3 {
            color: #333;
        }

        .setup-container {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .size-input {
            padding: 5px;
            width: 60px;
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .instruction {
            font-size: 18px;
            margin: 20px 0;
            color: #0056b3;
            font-weight: bold;
        }

        .grid-wrapper {
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            gap: 0;
            border: 1px solid #333;
            /* outer border slightly thinner */
            width: fit-content;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            font-size: 16px;
            transition: background-color 0.2s;
            box-sizing: border-box;
            background-color: transparent;
        }

        .cell:hover {
            background-color: #f0f0f0;
        }

        /* Setup Grid Colors matching HW1-1 requirements */
        .start {
            background-color: #28a745 !important;
            color: white !important;
            font-weight: bold;
            border-color: #333;
        }

        .end {
            background-color: #dc3545 !important;
            color: white !important;
            font-weight: bold;
            border-color: #333;
        }

        .obstacle {
            background-color: #7b7b7b !important;
            color: white !important;
            border-color: #333;
        }

        /* Results Display matching HW1-2 requirements */
        .matrices-container {
            display: flex;
            gap: 50px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .result-block {
            width: 100%;
            margin-bottom: 25px;
        }

        .result-title {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0 8px;
        }

        .result-subtitle {
            margin: 0;
            color: #4b5563;
            font-size: 14px;
        }

        /* Optimal path highlighting */
        .optimal-path {
            background-color: #FFFF99 !important;
            font-weight: bold;
        }

        /* Value cell colors */
        .value-high {
            background-color: #90EE90 !important;
        }

        .value-medium-high {
            background-color: #ADD8E6 !important;
        }

        .value-medium {
            background-color: #B0C4DE !important;
        }

        .value-medium-low {
            background-color: #FFB6C1 !important;
        }

        .value-low {
            background-color: #FFB0B0 !important;
        }

        .value-end {
            background-color: #FF6B6B !important;
            font-weight: bold;
        }

        .matrix-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .matrix-title {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        /* Container with axes */
        .axes-container {
            display: flex;
        }

        /* Y-axis wrapper */
        .y-axis {
            display: flex;
            flex-direction: column;
            /* To make rows increment from bottom-up visually */
            justify-content: space-around;
            padding-right: 10px;
            font-size: 12px;
            color: #333;
            /* Border representing the y-axis line */
            border-right: 2px solid #333;
            margin-right: 5px;
        }

        .y-axis-label {
            height: 60px;
            /* match matrix cell height */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5px;
        }

        /* Main matrix container */
        .matrix-content-wrapper {
            display: flex;
            flex-direction: column;
        }

        /* The data grid */
        .matrix {
            display: grid;
            gap: 0;
            border: 1px solid #1f77b4;
            /* blue outer bound similar to image */
        }

        .matrix .cell {
            width: 60px;
            height: 60px;
            cursor: default;
            color: #333;
            /* black font */
            border: 1px solid #1f77b4;
            /* inner blueish borders */
            font-size: 14px;
        }

        .matrix .cell:hover {
            background-color: transparent;
        }

        .matrix .obstacle {
            background-color: #7f7f7f !important;
            /* solid gray matching HW pic */
            border: 1px solid #333;
            /* dark border for blocks */
            color: transparent !important;
        }

        /* X-axis wrapper */
        .x-axis {
            display: flex;
            padding-top: 5px;
            margin-top: 5px;
        }

        .x-axis-label {
            width: 60px;
            /* match matrix cell width */
            text-align: center;
            font-size: 12px;
            color: #333;
        }

        /* Loading spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>Grid World</h1>

    <div class="setup-container">
        <label>輸入網格大小（5 到 9）： </label>
        <input type="number" id="gridSize" class="size-input" min="5" max="9" value="5">
        <button onclick="generateGrid()">Generate Grid</button>
    </div>

    <div id="gridArea" style="display:none;">
        <h2 id="gridTitle" style="margin-bottom: 15px;">5 x 5 Grid:</h2>

        <div id="instruction" class="instruction">
            1. 點擊一個格子設定起點（綠色）。
        </div>

        <div class="grid-wrapper">
            <div id="mainGrid" class="grid"></div>
        </div>

        <div style="margin-top: 20px; margin-bottom: 30px;">
            <button id="calcBtn" onclick="calculatePolicyAndValue()"
                style="display:none; padding: 10px 20px; font-size:16px;">
                計算 HW1-2 策略評估與 HW1-3 最佳策略
            </button>
            <div id="loading" class="loader"></div>
        </div>
    </div>

    <div class="matrices-container" id="resultsContainer" style="display:none;">
        <div class="result-block">
            <div class="result-title">HW1-2：隨機策略與策略評估</div>
            <p class="result-subtitle">顯示每個狀態的隨機行動（↑↓←→）與對應價值函數 V(s)</p>
            <div class="matrices-container">
                <div class="matrix-wrapper">
                    <div class="matrix-title">Random Policy:</div>
                    <div class="axes-container">
                        <div class="y-axis" id="randPolYAxis"></div>
                        <div class="matrix-content-wrapper">
                            <div id="randomPolicyMatrix" class="matrix"></div>
                            <div class="x-axis" id="randPolXAxis"></div>
                        </div>
                    </div>
                </div>

                <div class="matrix-wrapper">
                    <div class="matrix-title">Value Function V(s):</div>
                    <div class="axes-container">
                        <div class="y-axis" id="randValYAxis"></div>
                        <div class="matrix-content-wrapper">
                            <div id="randomValueMatrix" class="matrix"></div>
                            <div class="x-axis" id="randValXAxis"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="result-block">
            <div class="result-title">HW1-3：價值迭代最佳政策</div>
            <p class="result-subtitle">以 Value Iteration 推導最佳行動並更新價值函數（黃色為最佳路徑）</p>
            <div class="matrices-container">
                <div class="matrix-wrapper">
                    <div class="matrix-title">Optimal Policy:</div>
                    <div class="axes-container">
                        <div class="y-axis" id="optPolYAxis"></div>
                        <div class="matrix-content-wrapper">
                            <div id="optimalPolicyMatrix" class="matrix"></div>
                            <div class="x-axis" id="optPolXAxis"></div>
                        </div>
                    </div>
                </div>

                <div class="matrix-wrapper">
                    <div class="matrix-title">Optimal Value Function V*(s):</div>
                    <div class="axes-container">
                        <div class="y-axis" id="optValYAxis"></div>
                        <div class="matrix-content-wrapper">
                            <div id="optimalValueMatrix" class="matrix"></div>
                            <div class="x-axis" id="optValXAxis"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let n = 5;
        let startCell = null;
        let endCell = null;
        let obstacles = [];
        let maxObstacles = 0;

        function generateGrid() {
            const sizeInput = document.getElementById('gridSize').value;
            n = parseInt(sizeInput);

            if (isNaN(n) || n < 5 || n > 9) {
                alert("請輸入 5 到 9 的整數。\n(HW1-1 規範：n 範圍為 5~9)");
                return;
            }

            maxObstacles = n - 2;
            startCell = null;
            endCell = null;
            obstacles = [];

            document.getElementById('gridArea').style.display = 'block';
            document.getElementById('gridTitle').innerText = `${n} x ${n} Grid:`;
            document.getElementById('calcBtn').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'none';

            const gridElement = document.getElementById('mainGrid');
            gridElement.style.gridTemplateColumns = `repeat(${n}, 50px)`;
            gridElement.innerHTML = '';

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = (i * n + j + 1);
                    cell.dataset.r = i;
                    cell.dataset.c = j;
                    cell.onclick = () => handleCellClick(cell, i, j);
                    gridElement.appendChild(cell);
                }
            }

            updateInstruction();
        }

        function updateInstruction() {
            const inst = document.getElementById('instruction');
            if (!startCell) {
                inst.innerText = "1. 點擊一個格子設定起點（綠色）。";
            } else if (!endCell) {
                inst.innerText = "2. 點擊一個格子設定終點（紅色）。";
            } else if (obstacles.length < maxObstacles) {
                const rem = maxObstacles - obstacles.length;
                inst.innerText = `3. 請再點擊 ${rem} 個障礙物（灰色），總數需為 n-2 = ${maxObstacles}。`;
            } else {
                inst.innerText = "設定完成！可開始計算 HW1-2（策略評估）與 HW1-3（價值迭代）。";
                document.getElementById('calcBtn').style.display = 'inline-block';
            }
        }

        function handleCellClick(cellElem, r, c) {
            const stateId = `${r},${c}`;

            if (!startCell) {
                startCell = stateId;
                cellElem.classList.add('start');
                updateInstruction();
            }
            else if (!endCell && stateId !== startCell) {
                endCell = stateId;
                cellElem.classList.add('end');
                updateInstruction();
            }
            else if (obstacles.length < maxObstacles && stateId !== startCell && stateId !== endCell) {
                if (!obstacles.includes(stateId)) {
                    obstacles.push(stateId);
                    cellElem.classList.add('obstacle');
                    cellElem.innerText = '';
                    updateInstruction();
                }
            }
        }

        async function calculatePolicyAndValue() {
            if (!startCell || !endCell) {
                alert('請先設定起點與終點。');
                return;
            }
            if (obstacles.length !== maxObstacles) {
                alert(`障礙物數量需為 n-2 = ${maxObstacles}。`);
                return;
            }

            document.getElementById('calcBtn').disabled = true;
            document.getElementById('loading').style.display = 'inline-block';

            const reqData = {
                n: n,
                start: startCell.split(',').map(Number),
                end: endCell.split(',').map(Number),
                obstacles: obstacles.map(coord => coord.split(',').map(Number)),
                algorithm: 'value_iter'
            };

            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqData)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || "伺服器計算失敗。");
                }

                const data = await response.json();
                renderAllResults(data);
            } catch (error) {
                alert("計算失敗：" + error.message);
                console.error(error);
            } finally {
                document.getElementById('calcBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function getValueRange(matrixData) {
            const numbers = [];
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const value = matrixData[i][j];
                    if (value !== 'X' && value !== 'G') {
                        numbers.push(parseFloat(value));
                    }
                }
            }
            if (numbers.length === 0) {
                return { min: 0, max: 0 };
            }
            return {
                min: Math.min(...numbers),
                max: Math.max(...numbers)
            };
        }

        function applyValueColor(cell, val, minVal, maxVal) {
            if (maxVal === minVal) {
                cell.classList.add('value-medium');
                return;
            }

            const normalized = (val - minVal) / (maxVal - minVal);

            if (normalized >= 0.8) {
                cell.classList.add('value-low');
            } else if (normalized >= 0.6) {
                cell.classList.add('value-medium-low');
            } else if (normalized >= 0.4) {
                cell.classList.add('value-medium');
            } else if (normalized >= 0.2) {
                cell.classList.add('value-medium-high');
            } else {
                cell.classList.add('value-high');
            }
        }

        function buildAxes(yAxis, xAxis) {
            yAxis.innerHTML = '';
            xAxis.innerHTML = '';

            for (let i = 0; i < n; i++) {
                const yLabel = document.createElement('div');
                yLabel.className = 'y-axis-label';
                yLabel.innerText = `${n - 1 - i}`;
                yAxis.appendChild(yLabel);
            }

            for (let j = 0; j < n; j++) {
                const xLabel = document.createElement('div');
                xLabel.className = 'x-axis-label';
                xLabel.innerText = `${j}`;
                xAxis.appendChild(xLabel);
            }
        }

        function renderMatrix(matrixData, type, gridId, yAxisId, xAxisId, pathSet, highlightPath) {
            const isValue = type === 'value';
            const grid = document.getElementById(gridId);
            const yAxis = document.getElementById(yAxisId);
            const xAxis = document.getElementById(xAxisId);

            const valueRange = isValue ? getValueRange(matrixData) : null;

            grid.style.gridTemplateColumns = `repeat(${n}, 60px)`;
            grid.innerHTML = '';
            buildAxes(yAxis, xAxis);

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    const value = matrixData[i][j];
                    const isOnPath = highlightPath && pathSet.has(`${i},${j}`);

                    if (value === 'X') {
                        cell.classList.add('obstacle');
                    } else if (value === 'G') {
                        cell.innerText = 'G';
                        if (isOnPath) {
                            cell.classList.add('optimal-path');
                        }
                    } else if (isValue) {
                        const val = parseFloat(value);
                        cell.innerText = Number.isFinite(val) ? val.toFixed(2) : '0.00';
                        applyValueColor(cell, Number.isFinite(val) ? val : 0, valueRange.min, valueRange.max);
                    } else {
                        if (value === '↑') cell.innerHTML = '&#8593;';
                        else if (value === '↓') cell.innerHTML = '&#8595;';
                        else if (value === '←') cell.innerHTML = '&#8592;';
                        else if (value === '→') cell.innerHTML = '&#8594;';
                        else cell.innerText = value || '';

                        if (isOnPath) {
                            cell.classList.add('optimal-path');
                        }
                    }

                    grid.appendChild(cell);
                }
            }
        }

        function renderAllResults(data) {
            document.getElementById('resultsContainer').style.display = 'flex';

            const pathSet = new Set();
            if (data.optimal_path) {
                data.optimal_path.forEach(([r, c]) => {
                    pathSet.add(`${r},${c}`);
                });
            }

            renderMatrix(data.random_policy_matrix, 'policy', 'randomPolicyMatrix', 'randPolYAxis', 'randPolXAxis', pathSet, false);
            renderMatrix(data.random_value_matrix, 'value', 'randomValueMatrix', 'randValYAxis', 'randValXAxis', pathSet, false);
            renderMatrix(data.optimal_policy_matrix, 'policy', 'optimalPolicyMatrix', 'optPolYAxis', 'optPolXAxis', pathSet, true);
            renderMatrix(data.optimal_value_matrix, 'value', 'optimalValueMatrix', 'optValYAxis', 'optValXAxis', pathSet, false);

            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>

</html>
